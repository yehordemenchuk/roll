# Spustenie: z koreňa „Cube Roll“: docker compose up --build
# Na serveri nastavte POSTGRES_PASSWORD a JWT_SECRET (dlhý náhodný reťazec).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gamestudiodb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gamestudiodb']
      interval: 5s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 8

  backend:
    build:
      context: ./GameStudioServer-Boy
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/gamestudiodb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: '6379'
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-secret-for-production-min-32}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1,http://localhost:80,http://127.0.0.1:80}
      SPRING_JPA_SHOW_SQL: 'false'
    ports:
      - '${BACKEND_PORT:-8080}:8080'

  frontend:
    build:
      context: ./cube-roll-frontend
      args:
        # Prázdne = relatívna cesta /api/v1 (nginx nižšie proxy na backend)
        VITE_API_BASE_URL: ''
    depends_on:
      - backend
    ports:
      - '${FRONTEND_PORT:-80}:80'

volumes:
  postgres_data:
